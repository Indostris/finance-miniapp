server {
    listen 80;

    # ── MIME types (Safari refuses fonts with wrong content-type) ────────────────
    types {
        font/otf                    otf;
        font/ttf                    ttf;
        font/woff                   woff;
        font/woff2                  woff2;
        application/javascript      js;
        text/css                    css;
        text/html                   html;
        image/svg+xml               svg;
        image/png                   png;
        image/jpeg                  jpg jpeg;
        image/gif                   gif;
        image/x-icon                ico;
    }

    # ── Gzip (runtime fallback for anything not pre-compressed) ──────────────────
    gzip             on;
    gzip_static      on;
    gzip_vary        on;
    gzip_proxied     any;
    gzip_comp_level  6;
    gzip_min_length  1024;
    gzip_types
        text/plain text/css text/javascript application/javascript
        application/json application/xml image/svg+xml
        font/otf font/ttf font/woff font/woff2;

    # ── API proxy ─────────────────────────────────────────────────────────────────
    location /api/ {
        # Handle CORS preflight — required for iOS Safari / WKWebView
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With" always;
            add_header Access-Control-Max-Age       86400 always;
            add_header Content-Length 0;
            add_header Content-Type  text/plain;
            return 204;
        }

        proxy_pass             http://backend:5001/;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_read_timeout     120s;
        proxy_connect_timeout  10s;
        client_max_body_size   50M;

        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With" always;
    }

    # ── Cache fonts 1 year ────────────────────────────────────────────────────────
    location ~* \.(otf|ttf|woff|woff2)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        gzip_static on;
    }

    # ── Cache hashed JS/CSS bundles forever ───────────────────────────────────────
    location ~* \.(?:js|css)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        gzip_static on;
    }

    # ── React app ─────────────────────────────────────────────────────────────────
    location /finance-miniapp/ {
        alias /usr/share/nginx/html/finance-miniapp/;
        try_files $uri $uri/ /finance-miniapp/index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── Redirect root ─────────────────────────────────────────────────────────────
    location = / {
        return 301 /finance-miniapp/;
    }
}

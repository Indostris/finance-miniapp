server {
    listen 80;

    # ── API proxy ─────────────────────────────────────────────────────────────
    location /api/ {
        # Handle CORS preflight (OPTIONS) — required for iOS Safari / WKWebView
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With" always;
            add_header Access-Control-Max-Age       86400 always;
            add_header Content-Length 0;
            add_header Content-Type  text/plain;
            return 204;
        }

        proxy_pass             http://backend:8000/;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_read_timeout     120s;
        proxy_connect_timeout  10s;
        client_max_body_size   50M;

        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With" always;
    }

    # ── React app ─────────────────────────────────────────────────────────────
    location /finance-miniapp/ {
        alias /usr/share/nginx/html/finance-miniapp/;
        try_files $uri $uri/ /finance-miniapp/index.html;

        # Cache static assets aggressively, but not index.html
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── Redirect root ─────────────────────────────────────────────────────────
    location = / {
        return 301 /finance-miniapp/;
    }
}

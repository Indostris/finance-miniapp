server {
    listen 80;

    # ── Font MIME types (Safari refuses fonts with wrong content-type) ─────────
    types {
        font/otf                              otf;
        font/ttf                              ttf;
        font/woff                             woff;
        font/woff2                            woff2;
        application/javascript                js;
        text/css                              css;
        text/html                             html;
        image/svg+xml                         svg;
        image/png                             png;
        image/jpeg                            jpg jpeg;
        image/gif                             gif;
        image/x-icon                          ico;
    }

    # ── API proxy ─────────────────────────────────────────────────────────────
    location /api/ {
        # Handle CORS preflight (OPTIONS) — required for iOS Safari / WKWebView
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With" always;
            add_header Access-Control-Max-Age       86400 always;
            add_header Content-Length 0;
            add_header Content-Type  text/plain;
            return 204;
        }

        proxy_pass             http://backend:8000/;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_read_timeout     120s;
        proxy_connect_timeout  10s;
        client_max_body_size   50M;

        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With" always;
    }

    # ── React app ─────────────────────────────────────────────────────────────
    location /finance-miniapp/ {
        alias /usr/share/nginx/html/finance-miniapp/;
        try_files $uri $uri/ /finance-miniapp/index.html;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # ── Redirect root ─────────────────────────────────────────────────────────
    location = / {
        return 301 /finance-miniapp/;
    }
}

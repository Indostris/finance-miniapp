services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: finance
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "123456"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d finance"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Ollama (LLM) ─────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama

  ollama-init:
    image: ollama/ollama
    entrypoint: /bin/sh
    command: -c "ollama pull llama3.2"
    environment:
      OLLAMA_HOST: http://ollama:11434
    depends_on:
      - ollama

  # ── FastAPI backend ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://postgres:123456@db:5432/finance"
      HF_HOME: /cache/huggingface
      TRANSFORMERS_CACHE: /cache/huggingface
    ports:
      - "5001:5001"
    volumes:
      - hf_cache:/cache/huggingface
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started

  # ── React frontend (nginx) ────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

  # ── Cloudflare Tunnel ─────────────────────────────────────────────────────────
  tunnel:
    build:
      context: ./tunnel
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - tunnel_data:/tunnel
    depends_on:
      - frontend

  # ── Telegram bot ──────────────────────────────────────────────────────────────
  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    volumes:
      - tunnel_data:/tunnel
    depends_on:
      - tunnel

volumes:
  postgres_data:
  tunnel_data:
  hf_cache:
  ollama_data:

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: finance
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "123456"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d finance"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── FastAPI backend ───────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://postgres:123456@db:5432/finance"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  # ── React frontend (nginx) ────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

  # ── Cloudflare tunnel ─────────────────────────────────────────────────────────
  cloudflare:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate --url http://frontend:80
    depends_on:
      - frontend

  # ── Telegram bot ──────────────────────────────────────────────────────────────
  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    restart: unless-stopped
    env_file: .env
    depends_on:
      - cloudflare

volumes:
  postgres_data:

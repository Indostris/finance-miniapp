server {
    listen 80;

    # ── Gzip (runtime fallback for anything not pre-compressed) ──────────────────
    gzip             on;
    gzip_static      on;    # serve .gz pre-built files when available (zero CPU cost)
    gzip_vary        on;
    gzip_proxied     any;
    gzip_comp_level  6;
    gzip_min_length  1024;
    gzip_types
        text/plain text/css text/javascript application/javascript
        application/json application/xml image/svg+xml
        font/otf font/ttf font/woff font/woff2;

    # ── Proxy API calls to the FastAPI backend ────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:5000/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
        client_max_body_size 50M;
    }

    # ── Cache fonts for 1 year (they are content-addressed by Vite) ──────────────
    location ~* \.(otf|ttf|woff|woff2)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        gzip_static on;
    }

    # ── Cache hashed JS/CSS bundles forever ──────────────────────────────────────
    location ~* \.(?:js|css)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        gzip_static on;
    }

    # ── Serve the React app ───────────────────────────────────────────────────────
    location /finance-miniapp/ {
        alias /usr/share/nginx/html/finance-miniapp/;
        try_files $uri $uri/ /finance-miniapp/index.html;
        # HTML must not be cached (it references hashed assets)
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── Redirect bare root to the app ────────────────────────────────────────────
    location = / {
        return 301 /finance-miniapp/;
    }
}
